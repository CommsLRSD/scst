<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Interactive knowledge guide for the Louis Riel School Division School and Classroom Support Team (SCST)."
  />
  <title>School &amp; Classroom Support Team — LRSD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- =========================================================================
       APP SHELL
       The app renders three "screens": #landing, #guided, #search-mode.
       A persistent top bar hosts brand, mode switch, dark-mode + search.
       Almost all content is injected by js/app.js from js/content.js.
       ====================================================================== -->
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="topbar" role="banner">
    <button class="brand" id="brandHome" aria-label="Go to home screen">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-text">
        <strong>SCST</strong>
        <small>Louis Riel School Division</small>
      </span>
    </button>

    <nav class="topbar-actions" aria-label="Primary">
      <button class="pill-btn" id="openSearchBtn" aria-haspopup="dialog">
        <svg class="ico" aria-hidden="true"><use href="#i-search"></use></svg>
        <span>Search</span>
        <kbd class="kbd">/</kbd>
      </button>
      <button
        class="icon-btn"
        id="themeToggle"
        aria-pressed="false"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
      >
        <svg class="ico" aria-hidden="true"><use href="#i-sun"></use></svg>
      </button>
    </nav>
  </header>

  <main id="main" class="stage" tabindex="-1">
    <!-- ---------------------------------------------------------------- LANDING -->
    <section id="landing" class="screen is-active" aria-label="Welcome">
      <div class="landing-inner">
        <p class="eyebrow" id="landingEyebrow"></p>
        <h1 class="landing-title" id="landingTitle"></h1>
        <p class="landing-tagline" id="landingTagline"></p>
        <p class="landing-intro" id="landingIntro"></p>

        <div class="path-cards">
          <button class="path-card" id="startGuided">
            <span class="path-icon" aria-hidden="true">
              <svg class="ico ico-lg"><use href="#i-route"></use></svg>
            </span>
            <span class="path-body">
              <span class="path-title">Guided mode</span>
              <span class="path-desc"
                >Move through the information one small section at a time, with
                progress and key takeaways.</span
              >
            </span>
            <span class="path-go" aria-hidden="true">→</span>
          </button>

          <button class="path-card" id="startSearch">
            <span class="path-icon" aria-hidden="true">
              <svg class="ico ico-lg"><use href="#i-search"></use></svg>
            </span>
            <span class="path-body">
              <span class="path-title">Search mode</span>
              <span class="path-desc"
                >Instantly find people, roles, services, supports, tiers, and
                keywords.</span
              >
            </span>
            <span class="path-go" aria-hidden="true">→</span>
          </button>
        </div>

        <ul class="landing-map" id="landingMap" aria-label="Jump to a section"></ul>
      </div>
    </section>

    <!-- ---------------------------------------------------------------- GUIDED -->
    <section id="guided" class="screen" aria-label="Guided learning">
      <div class="guided-frame">
        <div class="guided-head">
          <div class="progress" aria-hidden="true">
            <div class="progress-bar"><span id="progressFill"></span></div>
          </div>
          <p class="progress-label">
            <span id="stepNow">1</span> / <span id="stepTotal">9</span>
            <span class="progress-name" id="stepName"></span>
          </p>
          <div class="guided-tools">
            <button class="chip-btn" id="jumpToggle" aria-haspopup="true" aria-expanded="false">
              <svg class="ico" aria-hidden="true"><use href="#i-map"></use></svg>
              <span>Jump to section</span>
            </button>
          </div>
          <ul class="jump-menu" id="jumpMenu" role="menu" hidden></ul>
        </div>

        <div class="guided-content" id="guidedContent" aria-live="polite"></div>

        <div class="guided-nav">
          <button class="nav-btn ghost" id="homeBtn">
            <svg class="ico" aria-hidden="true"><use href="#i-home"></use></svg>
            <span>Home</span>
          </button>
          <div class="nav-spacer"></div>
          <button class="nav-btn" id="backBtn">
            <svg class="ico" aria-hidden="true"><use href="#i-back"></use></svg>
            <span>Back</span>
          </button>
          <button class="nav-btn primary" id="nextBtn">
            <span id="nextLabel">Next</span>
            <svg class="ico" aria-hidden="true"><use href="#i-next"></use></svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- ---------------------------------------------------------------- SEARCH OVERLAY -->
  <div
    id="searchOverlay"
    class="search-overlay"
    role="dialog"
    aria-modal="true"
    aria-label="Search"
    hidden
  >
    <div class="search-panel" role="document">
      <div class="search-inputwrap">
        <svg class="ico" aria-hidden="true"><use href="#i-search"></use></svg>
        <input
          type="search"
          id="searchInput"
          class="search-input"
          placeholder="Search people, roles, services, supports, tiers…"
          autocomplete="off"
          aria-label="Search content"
          aria-controls="searchResults"
        />
        <button class="icon-btn" id="searchClose" aria-label="Close search">
          <svg class="ico" aria-hidden="true"><use href="#i-close"></use></svg>
        </button>
      </div>
      <p class="search-hint" id="searchHint">
        Try “Indigenous”, “Tier 3”, “literacy”, or a person’s name.
      </p>
      <div class="search-results" id="searchResults" role="listbox" aria-label="Search results"></div>
    </div>
  </div>

  <!-- ---------------------------------------------------------------- PERSON MODAL -->
  <div id="personModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="personName" hidden>
    <div class="modal-card" role="document">
      <button class="icon-btn modal-close" id="personClose" aria-label="Close">
        <svg class="ico" aria-hidden="true"><use href="#i-close"></use></svg>
      </button>
      <p class="modal-area" id="personArea"></p>
      <h3 class="modal-name" id="personName"></h3>
      <p class="modal-role" id="personRole"></p>
      <p class="modal-summary" id="personSummary"></p>
      <!-- HOOK: per-person contact link renders here when person.contactUrl is set -->
      <div class="modal-actions" id="personActions"></div>
    </div>
  </div>

  <div class="scrim" id="scrim" hidden></div>

  <!-- ---------------------------------------------------------------- SVG ICON SPRITE -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
    <defs>
      <symbol id="i-search" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M11 19a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm10 2-4.3-4.3"/></symbol>
      <symbol id="i-sun" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19"/></g></symbol>
      <symbol id="i-moon" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></symbol>
      <symbol id="i-close" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6 6 18"/></symbol>
      <symbol id="i-home" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 11 12 4l8 7M6 10v9h12v-9"/></symbol>
      <symbol id="i-back" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 5l-7 7 7 7"/></symbol>
      <symbol id="i-next" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></symbol>
      <symbol id="i-map" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 4 3 6v14l6-2 6 2 6-2V4l-6 2-6-2Zm0 0v14m6-12v14"/></symbol>
      <symbol id="i-route" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M8 19h6a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h6"/></g></symbol>
      <symbol id="i-compass" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2 5-5 2 2-5 5-2Z"/></g></symbol>
      <symbol id="i-heart" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 20s-7-4.4-9.3-8.5A4.7 4.7 0 0 1 12 6a4.7 4.7 0 0 1 9.3 5.5C19 15.6 12 20 12 20Z"/></symbol>
      <symbol id="i-handshake" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m3 12 4-4 4 3 3-1 4 4M11 11l2 2m-2 4 2 2 2-2 2 2M3 12v4l3 3M21 14v-4"/></symbol>
      <symbol id="i-layers" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m12 3 9 5-9 5-9-5 9-5Zm9 9-9 5-9-5m18 4-9 5-9-5"/></symbol>
      <symbol id="i-chart" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 20V4m0 16h16M8 16v-4m4 4V8m4 8v-6"/></symbol>
      <symbol id="i-users" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0M16 5.5a3 3 0 0 1 0 5.9M17 14a6 6 0 0 1 4 6"/></g></symbol>
      <symbol id="i-building" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M5 21V5l7-2 7 2v16M9 8h.01M9 12h.01M9 16h.01M15 8h.01M15 12h.01M15 16h.01"/></symbol>
      <symbol id="i-telescope" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="m3 14 12-6 3 5-12 6-3-5Zm12-6 3-4 4 2-3 5M9 17l-2 4m6-6-1 6"/></symbol>
      <symbol id="i-star" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" d="m12 3 2.6 5.3 5.9.9-4.2 4.1 1 5.8L12 16.9 6.7 19.9l1-5.8L3.5 9.9l5.9-.9L12 3Z"/></symbol>
      <symbol id="i-book" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 5a2 2 0 0 1 2-2h6v16H6a2 2 0 0 0-2 2V5Zm16 0a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2V5Z"/></symbol>
      <symbol id="i-shield" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6l-7-3Zm-2 8 1.6 1.6L15 9"/></symbol>
      <symbol id="i-feather" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M20 4A8 8 0 0 0 8 5L4 9v11M20 4c1 6-2 11-8 12l-4 .5M20 4 9 15m5-5H9"/></symbol>
      <symbol id="i-pulse" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 12h4l2-6 4 12 2-6h6"/></symbol>
      <symbol id="i-sparkles" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 3v6m0 6v6m-9-9h6m6 0h6M6 6l3 3m6 6 3 3m0-12-3 3m-6 6-3 3"/></symbol>
    </defs>
  </svg>

  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
